<!DOCTYPE html>
<html lang="fr">

    <title>Astrolabo</title>
    <style>
        /* Reset et centrage parfait */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1e293b; /* Bleu-gris très foncé et doux pour le texte */
            
            /* Fond "Espace Clair" : Dégradé de nébuleuses pastel */
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(219, 234, 254, 0.6) 0px, transparent 50%),   /* Bleu ciel */
                radial-gradient(at 100% 0%, rgba(243, 232, 255, 0.6) 0px, transparent 50%), /* Violet aube */
                radial-gradient(at 50% 100%, rgba(224, 242, 254, 0.5) 0px, transparent 50%);/* Éclat polaire */
            
            overflow: hidden;
        }

        /* Conteneur principal minimaliste */
        .card {
            text-align: center;
            padding: 40px;
            animation: fadeIn 1.5s ease-out;
        }
